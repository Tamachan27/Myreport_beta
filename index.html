<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Archive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- TOP NAV -->
<header class="topnav">
    <div class="topnav-left">
        <span class="topnav-icon">♫</span>
        <span class="topnav-title">My Music Archive</span>
    </div>
    <nav class="topnav-right">
        <button class="nav-pill active" onclick="showSection('dashboard', this)">Dashboard</button>
        <button class="nav-pill" onclick="showSection('weekly', this)">Weekly</button>
        <button class="nav-pill" onclick="showSection('annual', this)">Annual</button>
        <button class="nav-pill" onclick="showSection('live', this)">Live</button>
        <button class="theme-btn" onclick="toggleTheme()" title="テーマ切替">☀</button>
    </nav>
</header>

<div class="page-bg">
    <main class="content">

        <!-- ===== DASHBOARD ===== -->
        <section id="dashboard">

            <!-- 上段：合計＋今年 -->
            <div class="top-row">
                <div class="stat-block">
                    <div class="stat-block-label">TOTAL LISTENING TIME</div>
                    <div id="totalMinutes" class="stat-block-num grad-text">—</div>
                    <div id="totalDays" class="stat-block-sub">計算中...</div>
                </div>
                <div class="stat-block">
                    <div class="stat-block-label">2026 MINUTES</div>
                    <div id="year2026Minutes" class="stat-block-num grad-text">—</div>
                    <div class="stat-block-sub">2026年の合計再生時間</div>
                </div>
                <div class="stat-block">
                    <div class="stat-block-label">MOST SEEN ARTIST</div>
                    <div id="mostSeenArtist" class="stat-block-num grad-text" style="font-size:clamp(20px,3vw,36px)">—</div>
                    <div id="mostSeenCount" class="stat-block-sub">0回</div>
                </div>
            </div>

            <!-- 中段：アーティストランキング＋チャート -->
            <div class="mid-row">
                <div class="card ranking-card">
                    <div class="card-label">ALL-TIME ARTIST RANKING</div>
                    <div id="artistRanking"></div>
                </div>
                <div class="card chart-card">
                    <div class="card-label">WEEKLY TREND <span style="opacity:.5;font-size:11px;">直近10週</span></div>
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>

            <!-- 下段：Latest Week -->
            <div class="card latest-card">
                <div class="card-label">LATEST WEEK</div>
                <div id="latestWeek"></div>
            </div>

        </section>

        <!-- ===== WEEKLY ===== -->
        <section id="weekly" class="hidden">
            <div class="section-header">
                <h2>Weekly History</h2>
                <p class="section-sub">週ごとの記録</p>
            </div>
            <div id="weeklyList" class="card-grid"></div>
        </section>

        <!-- ===== ANNUAL ===== -->
        <section id="annual" class="hidden">
            <div class="section-header">
                <h2>Annual History</h2>
                <p class="section-sub">年間サマリー</p>
            </div>
            <div id="annualList" class="card-grid"></div>
        </section>

        <!-- ===== LIVE ===== -->
        <section id="live" class="hidden">
            <div class="section-header">
                <h2>Live Archive</h2>
                <p class="section-sub">参加したライブの記録</p>
            </div>
            <div class="filter-bar">
                <label>年でフィルタ：</label>
                <select id="liveYearFilter" onchange="filterLive()">
                    <option value="all">すべて</option>
                </select>
            </div>
            <div id="liveList"></div>
        </section>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
